# ── Backend ──────────────────────────────────────────────────────────────────
backend          = "xrender";
use-damage       = true;
full-damage      = true;
unredir-if-possible = true;

# ── Shadows ───────────────────────────────────────────────────────────────────
shadow         = true;
full-shadow    = false;
shadow-opacity = 0.9;
shadow-radius  = 1;
shadow-offset-x = 5;
shadow-offset-y = 5;
shadow-color = "#8a8a96"

# ── Fading ────────────────────────────────────────────────────────────────────
fading         = true;
fade-in-step   = 0.04;
fade-out-step  = 0.04;

# ── Corners ───────────────────────────────────────────────────────────────────
detect-rounded-corners = false;
corner-radius          = 0;

# ── Animations ────────────────────────────────────────────────────────────────
animations = true;
animations = ({
  triggers = ["open"];

  opacity = {
    duration = 0.2;
    start    = 1;
    end      = 1;
  };
  scale-x = {
    curve    = "cubic-bezier(0.2, 0.9, 0.3, 1.0)";
    duration = 0.2;
    start    = 0.8;
    end      = 1;
  };
  scale-y = {
    curve    = "cubic-bezier(0.2, 0.9, 0.3, 1.0)";
    duration = 0.2;
    start    = 0.8;
    end      = 1;
  };

  offset-x = "(1 - scale-x) * window-width / 2";
  offset-y = "(1 - scale-y) * window-height / 2";

  shadow-scale-x  = "scale-x";
  shadow-scale-y  = "scale-y";
  shadow-offset-x = "offset-x";
  shadow-offset-y = "offset-y";
}, {
  triggers = ["close"];

  opacity = {
    duration = 0.3;
    start    = 1;
    end      = 0;
  };
  scale-x = {
    curve    = "cubic-bezier(0.2, 0.0, 0.3, 1.0)";
    duration = 0.2;
    start    = 1;
    end      = 0.8;
  };
  scale-y = {
    curve    = "cubic-bezier(0.2, 0.0, 0.3, 1.0)";
    duration = 0.2;
    start    = 1;
    end      = 0.8;
  };

  offset-x = "(1 - scale-x) * window-width / 2";
  offset-y = "(1 - scale-y) * window-height / 2";

  shadow-scale-x  = "scale-x";
  shadow-scale-y  = "scale-y";
  shadow-offset-x = "offset-x";
  shadow-offset-y = "offset-y";
}, {
  triggers = ["geometry"];

  scale-x = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    start    = "window-width-before / window-width";
    end      = 1;
    duration = 0.35;
  };
  scale-y = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    start    = "window-height-before / window-height";
    end      = 1;
    duration = 0.35;
  };
  offset-x = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    start    = "window-x-before - window-x";
    end      = 0;
    duration = 0.35;
  };
  offset-y = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.2)";
    start    = "window-y-before - window-y";
    end      = 0;
    duration = 0.35;
  };

  shadow-scale-x  = "scale-x";
  shadow-scale-y  = "scale-y";
  shadow-offset-x = "offset-x";
  shadow-offset-y = "offset-y";
})

# ── Rules ─────────────────────────────────────────────────────────────────────
rules = (
  {
    match         = "window_type = 'dock'";
    corner-radius = 0;
    # shadow        = false;
  },
  {
    match         = "class_g = 'eww' || class_g = 'eww-bar'";
    corner-radius = 0;
    shadow        = false;
    unredir       = false;
    repaint       = false;
  },
  {
    match         = "class_g = 'Dunst' || name = 'Dunst'";
    corner-radius = 0;
  },
  {
    match         = "class_g = 'Rofi'";
    corner-radius = 0;
