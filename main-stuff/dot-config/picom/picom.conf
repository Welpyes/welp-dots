backend              = "xrender";
use-damage           = true;
full-damage          = true;
unredir-if-possible  = true;
shadow               = false;
fading               = true;
fade-in-step         = 0.03;
fade-out-step        = 0.04;

animations = true;
animations = ({
  triggers = ["geometry"];

  scale-x = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    start    = "window-width-before / window-width";
    end      = 1;
    duration = 0.35;
  };
  scale-y = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    start    = "window-height-before / window-height";
    end      = 1;
    duration = 0.35;
  };
  offset-x = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    start    = "window-x-before - window-x";
    end      = 0;
    duration = 0.35;
  };
  offset-y = {
    curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.2)";
    start    = "window-y-before - window-y";
    end      = 0;
    duration = 0.35;
  };

  shadow-scale-x  = "scale-x";
  shadow-scale-y  = "scale-y";
  shadow-offset-x = "offset-x";
  shadow-offset-y = "offset-y";
})

rules = (
  {
    match         = "window_type = 'dock'";
    corner-radius = 0;
    # shadow        = false;
  },
  {
    match         = "class_g = 'eww' || class_g = 'eww-bar'";
    corner-radius = 0;
    shadow        = false;
    unredir       = false;
    repaint       = false;
  },
)
